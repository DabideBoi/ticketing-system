services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ticketing}
      POSTGRES_USER: ${DB_USERNAME:-ticketing}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ticketing}
    ports:
      - "5432:5432"
    volumes:
      - ticketing-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ticketing}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ticketing-postgres-data:
